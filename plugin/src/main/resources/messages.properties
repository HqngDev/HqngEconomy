# HqngEconomy - Messages
# Placeholders: {0}, {1}, {2}, ...
# MiniMessage tags: <green>, <red>, <aqua>, etc.
#
# Currency display: pass the already-pluralized name as {1}
#   e.g. "100 Coins", "1 Coin", "5 Gems", "1 Gem"
# Use NumberUtil.pluralize(amount, singular, plural) to pick the right form.

# -- Prefix --
prefix=<gradient:#FFD700:#FFA500>[HqngEconomy]</gradient>

# -- Generic / Errors --
no-permission={prefix} <red>You don't have permission.
player-only={prefix} <red>This command can only be used by players.
invalid-amount={prefix} <red>Invalid amount: {0}
amount-positive={prefix} <red>Amount must be positive.
insufficient-funds={prefix} <red>Insufficient funds. Balance: {0}
player-not-found={prefix} <red>Player '{0}' does not have an account.
self-transfer={prefix} <red>Cannot transfer to yourself.
generic-error={prefix} <red>{0}

# -- /balance --
# Self: {0} = formatted amount, {1} = pluralized currency name
balance.self={prefix} <green>Your balance: <aqua>{0} {1}
# Other: {0} = player name, {1} = formatted amount, {2} = pluralized currency name
balance.other={prefix} <green>{0}'s balance: <aqua>{1} {2}
# Console/player with no args and not a player
balance.specify-player={prefix} <red>Usage: /balance [player]

# -- /gem --
# Self: {0} = formatted amount, {1} = pluralized currency name
balance.gem.self={prefix} <green>Your gems: <aqua>{0} {1}
# Other: {0} = player name, {1} = formatted amount, {2} = pluralized currency name
balance.gem.other={prefix} <green>{0}'s gems: <aqua>{1} {2}
# Console/player with no args and not a player
balance.gem.specify-player={prefix} <red>Usage: /gem [player]

# -- /pay --
pay.usage={prefix} <red>Usage: /pay <player> <amount>
# {0} = formatted amount, {1} = target name, {2} = sender's new balance
pay.success={prefix} <green>Paid <aqua>{0} <currency.money><green> to <aqua>{1}<green>. Your new balance: <aqua>{2}
# {0} = formatted amount, {1} = sender name, {2} = receiver's new balance
pay.received={prefix} <green>You received <aqua>{0} <currency.money><green> from <aqua>{1}<green>. Your new balance: <aqua>{2}

# -- /eco --
eco.usage={prefix} <red>Usage: /eco <give|set|reset> <player> <money|gem> <amount>
eco.invalid-currency={prefix} <red>Invalid currency. Use: money, gem
eco.invalid-action={prefix} <red>Unknown action. Use: give, set, reset
# {0} = formatted amount, {1} = target name, {2} = new balance
eco.give.money={prefix} <green>Gave <aqua>{0} <currency.money><green> to <aqua>{1}<green>. New balance: <aqua>{2}
eco.give.gem={prefix} <green>Gave <aqua>{0} <currency.gem.plural><green> to <aqua>{1}<green>. New balance: <aqua>{2}
eco.set.money={prefix} <green>Set <aqua>{0}<green>'s <currency.money> to <aqua>{1}
eco.set.gem={prefix} <green>Set <aqua>{0}<green>'s <currency.gem.plural> to <aqua>{1}
eco.reset.money={prefix} <green>Reset <aqua>{0}<green>'s <currency.money> to <aqua>{1}
eco.reset.gem={prefix} <green>Reset <aqua>{0}<green>'s <currency.gem.plural> to 0

# -- /eco reload --
reload.success={prefix} <green>Config and messages reloaded successfully.
reload.error={prefix} <red>Error reloading: {0}

# -- Plugin lifecycle --
plugin.enabled=HqngEconomy enabled! Database: {0}
plugin.disabled=HqngEconomy disabled.
plugin.saved-accounts=Saved {0} dirty accounts.
